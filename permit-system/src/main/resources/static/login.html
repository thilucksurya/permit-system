<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TradeWeb™ Live - Sign In</title>
    <link rel="stylesheet" href="/css/style.css">
    <title>TradeWeb™ Live - Sign In</title>
    <style>
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .app-logo {
            max-width: 250px;
            height: auto;
        }
    </style>

</head>
<body>

    <div class="login-box">
        <img src="logo.png" alt="CrimsonLogic" class="logo">
        <h2 class="title">TradeWeb™ Live</h2>
        
        <div class="form-container">
            <h3>Sign Into Your Account</h3>
            <p class="mandatory-text">All <span class="red">*</span> fields are mandatory</p>

            <div id="error-box" class="error-banner" style="display: none;">
                <span class="error-icon">⚠️</span>
                <div>
                    <strong>Error</strong>
                    <p id="error-text">Please provide User Id and Password</p>
                </div>
            </div>

            <div class="input-group">
                <label><span class="red">*</span> Username - (demo)</label>
                <input type="text" id="username">
            </div>

            <div class="input-group">
                <label><span class="red">*</span> Password - (123)</label>
                <input type="password" id="password">
            </div>

            <button id="signin-btn" onclick="handleLogin()">Sign In</button>
           
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
