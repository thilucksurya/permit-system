<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - TradeWeb Live</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">

        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            </div>
            <h1>Reset Password</h1>
            <p>Enter your new password below</p>
        </div>

        <!-- Form -->
        <div id="form-section">
            <form id="pw-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="new-pw">New password</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                        <input type="password" id="new-pw" class="form-input" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
                        <button type="button" class="pw-toggle" onclick="togglePw('new-pw', this)" aria-label="Show password">
                            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                    <div class="pw-strength">
                        <div class="pw-strength-bar"></div>
                        <div class="pw-strength-bar"></div>
                        <div class="pw-strength-bar"></div>
                        <div class="pw-strength-bar"></div>
                    </div>
                    <div class="pw-strength-text" id="pw-strength-label"></div>
                    <div class="field-error" id="new-pw-error">Password must be at least 6 characters</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm-pw">Confirm password</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                        <input type="password" id="confirm-pw" class="form-input" placeholder="Re-enter password" required autocomplete="new-password">
                    </div>
                    <div class="field-error" id="confirm-pw-error">Passwords do not match</div>
                </div>

                <button type="submit" class="btn btn-primary" id="update-btn">
                    <span class="btn-label">Update Password</span>
                    <div class="spinner"></div>
                </button>
            </form>
        </div>

        <!-- Success -->
        <div id="success-section" style="display:none">
            <div class="success-state">
                <div class="success-check">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <h2>Password Updated</h2>
                <p>Your password has been successfully changed. You can now sign in with your new password.</p>
                <a href="../index.html" class="btn btn-primary" style="text-decoration:none">
                    <span class="btn-label">Sign In</span>
                </a>
            </div>
        </div>

        <div class="auth-footer" id="footer-section">
            <a href="../index.html">Back to Sign In</a>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2"></script>
    <script src="../js/lib/config.js?v=5"></script>
    <script src="../js/lib/ui.js?v=4"></script>
    <script src="../js/modules/auth.js?v=4"></script>
    <script>
        function togglePw(id, btn) {
            const i = document.getElementById(id);
            const show = i.type === 'password';
            i.type = show ? 'text' : 'password';
            btn.querySelector('.eye-open').style.display = show ? 'none' : 'block';
            btn.querySelector('.eye-closed').style.display = show ? 'block' : 'none';
        }

        document.getElementById('new-pw').addEventListener('input', function() {
            updateStrength(this.value);
            if (this.value && this.value.length < 6) showErr('new-pw-error'); else hideErr('new-pw-error');
            const c = document.getElementById('confirm-pw');
            if (c.value && c.value !== this.value) showErr('confirm-pw-error'); else hideErr('confirm-pw-error');
        });

        document.getElementById('confirm-pw').addEventListener('input', function() {
            const pw = document.getElementById('new-pw').value;
            if (this.value && this.value !== pw) showErr('confirm-pw-error'); else hideErr('confirm-pw-error');
        });

        document.getElementById('pw-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pw = document.getElementById('new-pw').value;
            const confirm = document.getElementById('confirm-pw').value;
            let ok = true;

            if (!pw || pw.length < 6) { showErr('new-pw-error'); ok = false; } else hideErr('new-pw-error');
            if (pw !== confirm) { showErr('confirm-pw-error'); ok = false; } else hideErr('confirm-pw-error');
            if (!ok) return;

            const btn = document.getElementById('update-btn');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                if (typeof Auth === 'undefined') throw new Error('Unable to connect to authentication service.');
                console.log('[Reset] Updating password...');
                await Auth.updatePassword(pw);
                document.getElementById('form-section').style.display = 'none';
                document.getElementById('footer-section').style.display = 'none';
                document.getElementById('success-section').style.display = 'block';
                Toast.success('Password updated!');
                console.log('[Reset] Password updated successfully');
            } catch (err) {
                console.error('[Reset] Error:', err.message);
                btn.classList.remove('loading');
                btn.disabled = false;
                Toast.error(err.message || 'Failed to update password. Please try again.');
            }
        });
    </script>
</body>
</html>
