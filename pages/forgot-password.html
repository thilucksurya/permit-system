<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - TradeWeb Live</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
    <div class="auth-card">

        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            </div>
            <h1>Forgot Password</h1>
            <p>Enter your email to receive a reset link</p>
        </div>

        <!-- Form -->
        <div id="form-section">
            <form id="reset-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">Email address</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>
                        <input type="email" id="email" class="form-input" placeholder="you@company.com" required autocomplete="email">
                    </div>
                    <div class="field-error" id="email-error">Please enter a valid email address</div>
                </div>

                <button type="submit" class="btn btn-primary" id="reset-btn">
                    <span class="btn-label">Send Reset Link</span>
                    <div class="spinner"></div>
                </button>
            </form>
        </div>

        <!-- Success -->
        <div id="success-section" style="display:none">
            <div class="success-state">
                <div class="success-check">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </div>
                <h2>Check Your Email</h2>
                <p>We've sent a password reset link to your email address. Click the link to create a new password.</p>
                <p id="resend-email" style="font-size:13px;color:var(--text-secondary);margin-bottom:12px"></p>
                <a href="../index.html" class="btn btn-primary" style="text-decoration:none;margin-bottom:10px">
                    <span class="btn-label">Back to Sign In</span>
                </a>
                <br>
                <button class="btn btn-secondary" id="resend-btn" onclick="resendReset()">
                    <span class="btn-label">Resend Reset Link</span>
                    <div class="spinner"></div>
                </button>
            </div>
        </div>

        <div class="auth-footer" id="footer-section">
            <a href="../index.html">Back to Sign In</a>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2"></script>
    <script src="../js/lib/config.js?v=5"></script>
    <script src="../js/lib/ui.js?v=4"></script>
    <script src="../js/modules/auth.js?v=4"></script>
    <script>
        var resetEmail = '';

        async function resendReset() {
            const btn = document.getElementById('resend-btn');
            btn.classList.add('loading');
            btn.disabled = true;
            try {
                await Auth.resetPassword(resetEmail);
                Toast.success('Reset link resent!');
            } catch (err) {
                Toast.error(err.message || 'Failed to resend. Please try again.');
            }
            btn.classList.remove('loading');
            btn.disabled = false;
        }

        document.getElementById('email').addEventListener('input', function() {
            if (this.value && !validateEmail(this.value)) showErr('email-error'); else hideErr('email-error');
        });

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email || !validateEmail(email)) { showErr('email-error'); return; }

            resetEmail = email;
            const btn = document.getElementById('reset-btn');
            btn.classList.add('loading');
            btn.disabled = true;

            try {
                if (typeof Auth === 'undefined') throw new Error('Unable to connect to authentication service.');
                await Auth.resetPassword(email);
                document.getElementById('form-section').style.display = 'none';
                document.getElementById('footer-section').style.display = 'none';
                document.getElementById('resend-email').textContent = email;
                document.getElementById('success-section').style.display = 'block';
                Toast.success('Reset link sent!');
            } catch (err) {
                btn.classList.remove('loading');
                btn.disabled = false;
                Toast.error(err.message || 'Failed to send reset link. Please try again.');
            }
        });
    </script>
</body>
</html>
